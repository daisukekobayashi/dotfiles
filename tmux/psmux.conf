set -g prefix C-a
unbind C-b

# Let psmux resolve the Windows shell. Do not port tmux's POSIX shell
# default-shell/default-command settings because SHELL is usually unset on Windows.

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse on
set -g mouse-selection off
set -g paste-detection off
setw -g mode-keys vi
# psmux yanks copy-mode selections to the Windows clipboard natively.
set -g set-clipboard on
bind -T copy-mode-vi v send-keys -X begin-selection

# ----- Pane splits -----

bind -T prefix "|" split-window -h
bind -T prefix - split-window -v
bind -T prefix h split-window -h
bind -T prefix v split-window -v

# ----- Layout mode (prefix + =) -----

bind = switch-client -T layout
bind -T layout = select-layout tiled
bind -T layout - select-layout even-vertical
bind -T layout "|" select-layout even-horizontal
bind -T layout Escape switch-client -T prefix
bind -T layout q switch-client -T prefix

set -g set-titles on
set -g set-titles-string "#S: #W"

set-option -g status-style bg=colour235,fg=colour136
set-window-option -g window-status-style fg=colour244,bg=default
set-window-option -g window-status-current-style fg=colour166,bg=default
set-option -g message-style bg=colour235,fg=colour166
set-window-option -g window-status-bell-style fg=colour235,bg=colour160

set -g visual-activity off

# PPM static key bindings only. Avoid running ppm.ps1 during startup.
source-file '~/.psmux/plugins/ppm/plugin.conf'
set -g @plugin 'psmux-plugins/psmux-sensible'
source-file '~/.psmux/plugins/psmux-sensible/plugin.conf'
set -g @plugin 'psmux-plugins/psmux-pain-control'
source-file '~/.psmux/plugins/psmux-pain-control/plugin.conf'
set -g @plugin 'psmux-plugins/psmux-resurrect'
source-file '~/.psmux/plugins/psmux-resurrect/plugin.conf'
set -g @plugin 'psmux-plugins/psmux-continuum'
set -g @continuum-restore 'on'
source-file '~/.psmux/plugins/psmux-continuum/plugin.conf'
set -g @plugin 'psmux-plugins/psmux-theme-kanagawa'
source-file '~/.psmux/plugins/psmux-theme-kanagawa/plugin.conf'

# Local overrides after plugin sources.
bind -T prefix h split-window -h
bind -T prefix v split-window -v
